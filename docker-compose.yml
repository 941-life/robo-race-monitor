services:
  gateway:
    build: .
    network_mode: host
    environment:
      ROS_MASTER_URI: ${ROS_MASTER_URI}
      ROS_IP: ${ROS_IP}
      GATEWAY_HOST: ${GATEWAY_HOST:-127.0.0.1}
      GATEWAY_PORT: ${GATEWAY_PORT:-8000}
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:-}
    volumes:
      - ./recordings:/data/recordings
    restart: unless-stopped
