services:
  gateway:
    build: .
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://192.168.1.10:11311}
      - ROS_IP=${ROS_IP:-192.168.1.42}
    volumes:
      - ./recordings:/data/recordings
    restart: unless-stopped

  caddy:
    image: caddy:2
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped
    depends_on:
      - gateway

  # ── dev profile only (docker compose --profile dev up) ──────────────────
  roscore:
    image: ros:noetic-ros-base
    network_mode: host
    command: roscore
    profiles: ["dev"]

  dummy:
    build:
      context: ./dummy
      dockerfile: Dockerfile.dummy
    network_mode: host
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
    depends_on:
      - roscore
    profiles: ["dev"]

volumes:
  caddy_data:
